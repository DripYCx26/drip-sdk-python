name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Verify package installs
        run: pip install dist/*.whl

      - name: Verify imports work
        run: |
          python -c "from drip import Drip, AsyncDrip; print('Full SDK imports OK')"
          python -c "from drip.core import Drip, AsyncDrip; print('Core SDK imports OK')"

      # Tests and strict linting are run in the monorepo
      # This CI validates the package builds and installs correctly
